<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Oracle — Wireframes &amp; Designs · Print</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="tokens.css" />
<style>
  @page { size: A4 landscape; margin: 0; }
  html, body { margin: 0; padding: 0; background: #FFFFFF; }
  body { font-family: var(--font-ui); color: var(--color-ink); -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  /* Each page is 297×210mm landscape A4. We use px for math then scale on print. */
  .page {
    width: 297mm;
    height: 210mm;
    overflow: hidden;
    background: #FFFFFF;
    page-break-after: always;
    break-after: page;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .page:last-child { page-break-after: auto; break-after: auto; }
  .page-inner {
    /* Each artboard's natural size; scaled to fit page. */
    transform-origin: center center;
    background: var(--color-bg);
    box-shadow: 0 0 0 0.5px #E8E6E0;
  }

  /* Footer caption stamped onto each page */
  .page-caption {
    position: absolute;
    left: 16mm; bottom: 8mm;
    font-family: var(--font-ui);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #767676;
    z-index: 10;
  }
  .page-folio {
    position: absolute;
    right: 16mm; bottom: 8mm;
    font-family: var(--font-mono);
    font-size: 9px;
    color: #767676;
    z-index: 10;
  }

  /* Suppress animations and overflow clipping; we want a static snapshot */
  *, *::before, *::after {
    animation: none !important;
    transition: none !important;
  }

  /* Cover page styling */
  .cover-page {
    width: 297mm; height: 210mm;
    background: #FAFAF7;
    display: flex;
    flex-direction: column;
    page-break-after: always;
    break-after: page;
    padding: 24mm 32mm;
    position: relative;
  }
  .cover-page .wordmark {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 400;
    letter-spacing: -0.01em;
    color: var(--color-ink);
    text-transform: lowercase;
  }
  .cover-page h1 {
    font-family: var(--font-display);
    font-size: 84px;
    line-height: 0.98;
    letter-spacing: -0.03em;
    font-weight: 400;
    margin: 32mm 0 12mm;
    max-width: 200mm;
  }
  .cover-page h1 em { font-style: italic; color: var(--color-teal); font-weight: 300; }
  .cover-page .lede {
    font-family: var(--font-text);
    font-size: 22px;
    line-height: 1.45;
    color: var(--color-ink-2);
    font-style: italic;
    font-weight: 300;
    max-width: 140mm;
  }
  .cover-page hr { width: 80px; height: 1px; background: var(--color-teal); border: 0; margin: 8mm 0 8mm; }
  .cover-page .meta {
    position: absolute;
    left: 32mm; bottom: 24mm;
    display: flex; gap: 24mm;
    font-family: var(--font-ui);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--color-ink-3);
  }
  .cover-page .meta b { font-family: var(--font-display); font-style: italic; font-weight: 400; font-size: 16px; color: var(--color-ink); text-transform: none; letter-spacing: 0; display: block; margin-top: 4px; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="orb.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="screens-foundations.jsx"></script>
<script type="text/babel" src="screens-intake.jsx"></script>
<script type="text/babel" src="screens-canvas.jsx"></script>
<script type="text/babel" src="screens-profile.jsx"></script>
<script type="text/babel" src="screens-boardpack.jsx"></script>
<script type="text/babel" src="screens-states.jsx"></script>

<script type="text/babel" data-presets="react">
(() => {
const {
  AB_Colors, AB_Type, AB_OrbGrid,
  AB_Intake, AB_FirstContact,
  AB_Canvas_Idle, AB_Canvas_Voice, AB_Canvas_Handoff, AB_Canvas_Mobile,
  AB_Profile_Strategy, AB_Profile_Risks, AB_Risk_Expanded, AB_Profile_Opportunities, AB_Profile_Maturity,
  AB_BoardPack_Cover, AB_BoardPack_Headline, AB_BoardPack_RiskChart,
  AB_VF_Handoff, AB_Errors_Toast, AB_Email,
} = window;

// Page dimensions: A4 landscape = 297 × 210mm.
// Convert to px at 96dpi (~3.7795 px/mm), with 16mm safe margin.
const PAGE_W_MM = 297, PAGE_H_MM = 210;
const MARGIN_MM = 14;
const MM_TO_PX = 96 / 25.4;
const SAFE_W_PX = (PAGE_W_MM - 2 * MARGIN_MM) * MM_TO_PX;  // ~ 1018px
const SAFE_H_PX = (PAGE_H_MM - 2 * MARGIN_MM) * MM_TO_PX;  // ~ 673px

function Page({ caption, folio, w, h, children }) {
  const scale = Math.min(SAFE_W_PX / w, SAFE_H_PX / h);
  return (
    <div className="page">
      <div className="page-caption">{caption}</div>
      <div className="page-folio">{folio}</div>
      <div className="page-inner" style={{
        width: w, height: h,
        transform: `scale(${scale})`,
      }}>
        {children}
      </div>
    </div>
  );
}

function CoverPage() {
  return (
    <div className="cover-page">
      <div className="wordmark">oracle</div>
      <h1>
        Wireframes &amp;<br/>
        <em>designs.</em>
      </h1>
      <hr />
      <div className="lede">
        Twenty artboards across foundations, intake, the canvas, profile, the board pack, and states &amp; touchpoints. Sized at production scale.
      </div>
      <div className="meta">
        <div>EDITION<b>v0.4</b></div>
        <div>DATE<b>May 2026</b></div>
        <div>FOR<b>The Oracle team</b></div>
        <div>PAGES<b>21 incl. cover</b></div>
      </div>
    </div>
  );
}

const ARTBOARDS = [
  ['00 · Design intent',                  null, AB_OrbGrid, null], // skip; covered later
];

// Define the pages in order — caption, width, height, component
const PAGES = [
  ['Foundations · Colour',          1280, 1380, AB_Colors,             '01 / 20'],
  ['Foundations · Type',            1280, 1080, AB_Type,               '02 / 20'],
  ['Foundations · The orb',         1280, 1320, AB_OrbGrid,            '03 / 20'],
  ['Onboarding · Intake',           1280,  800, AB_Intake,             '04 / 20'],
  ['Onboarding · First contact',    1280,  800, AB_FirstContact,       '05 / 20'],
  ['Canvas · Idle',                 1280,  940, AB_Canvas_Idle,        '06 / 20'],
  ['Canvas · Voice-active',         1280,  800, AB_Canvas_Voice,       '07 / 20'],
  ['Canvas · Handoff',              1280,  800, AB_Canvas_Handoff,     '08 / 20'],
  ['Canvas · Mobile',                430,  900, AB_Canvas_Mobile,      '09 / 20'],
  ['Profile · Strategy',            1280, 1260, AB_Profile_Strategy,   '10 / 20'],
  ['Profile · Risks',               1280, 1120, AB_Profile_Risks,      '11 / 20'],
  ['Profile · Risk expanded',       1280,  980, AB_Risk_Expanded,      '12 / 20'],
  ['Profile · Opportunities',       1280, 1080, AB_Profile_Opportunities, '13 / 20'],
  ['Profile · Maturity',            1280, 1100, AB_Profile_Maturity,   '14 / 20'],
  ['Board pack · Cover',            1280,  900, AB_BoardPack_Cover,    '15 / 20'],
  ['Board pack · The Headline',     1280, 1700, AB_BoardPack_Headline, '16 / 20'],
  ['Board pack · Risk slope chart', 1280, 1280, AB_BoardPack_RiskChart,'17 / 20'],
  ['States · Valorem First handoff',1280, 1060, AB_VF_Handoff,         '18 / 20'],
  ['States · Errors & toast',       1280, 1200, AB_Errors_Toast,       '19 / 20'],
  ['Touchpoints · Email',           1280, 1240, AB_Email,              '20 / 20'],
];

function App() {
  return (
    <>
      <CoverPage />
      {PAGES.map(([caption, w, h, Comp, folio], i) => (
        <Page key={i} caption={`ORACLE · ${caption}`} folio={folio} w={w} h={h}>
          <Comp />
        </Page>
      ))}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Auto-print once fonts and layout are ready
(async () => {
  try { await document.fonts.ready; } catch (e) {}
  // Give Babel-transformed JSX a beat to render
  await new Promise(r => setTimeout(r, 1200));
  window.print();
})();
})();
</script>
</body>
</html>
